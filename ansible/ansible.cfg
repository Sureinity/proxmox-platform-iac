[defaults]
inventory = inventories/prod/hosts.yml.example
roles_path = roles
host_key_checking = True
retry_files_enabled = False
stdout_callback = yaml
interpreter_python = auto_silent
yaml_valid_extensions = .yml, .yaml, .json, .example

[inventory]
enable_plugins = yaml, ini

[privilege_escalation]
become = True
become_method = sudo
