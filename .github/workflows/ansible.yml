name: Ansible

on:
  pull_request:
    paths:
      - "ansible/**"
      - ".github/workflows/ansible.yml"
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - ".github/workflows/ansible.yml"

jobs:
  validate:
    name: Lint and syntax check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible tooling
        run: python -m pip install --upgrade ansible-core ansible-lint yamllint

      - name: YAML lint
        run: yamllint .

      - name: Ansible lint
        run: ansible-lint playbooks/baseline.yml

      - name: Ansible syntax check
        run: ansible-playbook --syntax-check playbooks/baseline.yml
