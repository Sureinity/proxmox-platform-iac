name: Security

on:
  pull_request:
    paths:
      - "packer/**"
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "packer/**"
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/**"

jobs:
  trivy-config:
    name: Trivy config scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
